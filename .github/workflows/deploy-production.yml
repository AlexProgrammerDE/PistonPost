name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type deploy-production after the cutover checklist is approved
        required: true
        type: string

concurrency:
  group: pistonpost-production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'push' || inputs.confirmation == 'deploy-production'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      PRODUCTION_D1_DATABASE_ID: ${{ vars.PRODUCTION_D1_DATABASE_ID }}
      PRODUCTION_SECRETS_STORE_ID: ${{ vars.PRODUCTION_SECRETS_STORE_ID }}
      PRODUCTION_SMOKE_POST_SLUG: ${{ vars.PRODUCTION_SMOKE_POST_SLUG }}
      PRODUCTION_TURNSTILE_SITE_KEY: ${{ vars.PRODUCTION_TURNSTILE_SITE_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release gate
        run: bun run generated:check && bun run ci

      - name: Build production Worker
        working-directory: apps/web
        env:
          CLOUDFLARE_ENV: production
        run: bun run build

      - name: Prepare production configuration
        working-directory: apps/web
        run: bun run deploy:prepare:production

      - name: Verify production deployment
        working-directory: apps/web
        run: >-
          bunx wrangler deploy --config dist/server/wrangler.json --dry-run
          --x-provision=false --x-auto-create=false

      - name: Confirm existing production database
        working-directory: apps/web
        run: bunx wrangler d1 info DB --config dist/server/wrangler.json --json

      - name: Record D1 Time Travel bookmark
        id: bookmark
        working-directory: apps/web
        run: |
          bookmark="$(bunx wrangler d1 time-travel info DB --config dist/server/wrangler.json --json | jq -r 'if type == "array" then .[0].bookmark else .bookmark end')"
          test -n "$bookmark"
          echo "bookmark=$bookmark" >> "$GITHUB_OUTPUT"
          echo "D1 bookmark recorded before migration." >> "$GITHUB_STEP_SUMMARY"

      - name: List unapplied migrations
        working-directory: apps/web
        run: bunx wrangler d1 migrations list DB --config dist/server/wrangler.json --remote

      - name: Apply generated migrations
        working-directory: apps/web
        run: bunx wrangler d1 migrations apply DB --config dist/server/wrangler.json --remote

      - name: Deploy tagged Worker version
        working-directory: apps/web
        run: |
          subject="$(git log -1 --pretty=%s)"
          bunx wrangler deploy --config dist/server/wrangler.json --tag "$GITHUB_SHA" --message "$subject" --x-provision=false --x-auto-create=false

      - name: Run production smoke tests
        run: bun run smoke:production

      - name: Publish rollback checkpoint
        run: |
          echo "Rollback Worker commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Rollback D1 bookmark: ${{ steps.bookmark.outputs.bookmark }}" >> "$GITHUB_STEP_SUMMARY"
