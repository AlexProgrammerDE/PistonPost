name: Deploy production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type deploy-production after the cutover checklist is approved
        required: true
        type: string

concurrency:
  group: pistonpost-production
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.confirmation == 'deploy-production'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PRODUCTION_BASE_URL: ${{ vars.PRODUCTION_BASE_URL }}
      PRODUCTION_SMOKE_POST_SLUG: ${{ vars.PRODUCTION_SMOKE_POST_SLUG }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run release gate
        run: bun run ci

      - name: Confirm existing production database
        working-directory: apps/web
        run: bunx wrangler d1 info DB --env production --json

      - name: Record D1 Time Travel bookmark
        id: bookmark
        working-directory: apps/web
        run: |
          bookmark="$(bunx wrangler d1 time-travel info DB --env production --json | jq -r '.[0].bookmark // .bookmark')"
          test -n "$bookmark"
          echo "bookmark=$bookmark" >> "$GITHUB_OUTPUT"
          echo "D1 bookmark recorded before migration." >> "$GITHUB_STEP_SUMMARY"

      - name: List unapplied migrations
        working-directory: apps/web
        run: bunx wrangler d1 migrations list DB --env production --remote

      - name: Apply generated migrations
        working-directory: apps/web
        run: bunx wrangler d1 migrations apply DB --env production --remote

      - name: Deploy tagged Worker version
        working-directory: apps/web
        run: |
          subject="$(git log -1 --pretty=%s)"
          bunx wrangler deploy --env production --tag "$GITHUB_SHA" --message "$subject" --x-provision=false --x-auto-create=false

      - name: Run production smoke tests
        run: bun run smoke:production

      - name: Publish rollback checkpoint
        run: |
          echo "Rollback Worker commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Rollback D1 bookmark: ${{ steps.bookmark.outputs.bookmark }}" >> "$GITHUB_STEP_SUMMARY"
