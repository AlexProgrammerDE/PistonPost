name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify generated files
        run: bun run generated:check

      - name: Run local CI gate
        run: bun run ci

      - name: Prepare browser test environment
        run: |
          umask 077
          printf '%s\n' \
            'BETTER_AUTH_SECRET=ci-only-better-auth-secret-that-is-never-deployed' \
            'BETTER_AUTH_API_KEY=ci-only-better-auth-api-key' \
            'EMAIL_UNSUBSCRIBE_SECRET=ci-only-email-unsubscribe-secret' \
            'TURNSTILE_SECRET=1x0000000000000000000000000000000AA' \
            'STREAM_WEBHOOK_SECRET=ci-only-stream-webhook-secret' \
            'STREAM_ACCOUNT_ID=ci-only-stream-account-id' \
            'STREAM_API_TOKEN=ci-only-stream-api-token' \
            > .dev.vars
          bunx --bun wrangler d1 migrations apply DB --local

      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: bun run test:e2e
